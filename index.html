<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProMessage | Modern Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/messages.css">
    <link rel="stylesheet" href="styles/footer.css">
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import { appStore } from './state/appState.js';
        import { chatService } from './services/chatService.js';
        import { authService } from './services/authService.js';
        import { renderApp } from './routes/appRoutes.js';

        window.app = {
            handleSend: async (e) => {
                e.preventDefault();
                const input = document.getElementById('messageInput');
                const text = input.value.trim();
                if (!text) return;

                const newMessage = await chatService.sendMessage(text);
                const state = appStore.getState();
                appStore.setState({ 
                    messages: [...state.messages, newMessage] 
                });
                input.value = '';
            },
            goBack: () => {
                // In a real app with a sidebar, this would switch views.
                // For this professional single-pane version, we'll simulate a refresh or clear.
                console.log('Navigating back...');
                const appEl = document.getElementById('app');
                appEl.style.opacity = '0';
                setTimeout(() => {
                    appEl.style.opacity = '1';
                    renderApp();
                }, 300);
            },
            toggleTheme: () => {
                document.body.classList.toggle('dark-theme');
            }
        };

        appStore.subscribe(renderApp);

        async function init() {
            const contact = await chatService.getContact();
            const messages = await chatService.getMessages();
            const user = authService.getCurrentUser();
            
            appStore.setState({ 
                activeContact: contact, 
                messages, 
                currentUser: user,
                isLoading: false 
            });
        }

        init();
    </script>
</body>
</html>
